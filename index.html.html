<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 디벗 대여 시스템</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; --accent-color: #e74c3c; --success-color: #2ecc71; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--primary-color); text-align: center; font-size: 1.6rem; margin-top: 0; }
        .notice-box { background: #fff5f5; border-left: 4px solid var(--accent-color); padding: 15px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-menu button { flex: 1; padding: 14px; border: none; background: #eee; cursor: pointer; border-radius: 10px; font-weight: bold; color: #666; transition: 0.3s; }
        .tab-menu button.active { background: var(--primary-color); color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .input-label { display: block; font-weight: bold; font-size: 0.95rem; margin-bottom: 8px; color: #333; }
        .id-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        .main-btn { width: 100%; padding: 18px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .status-card { background: #f0f7ff; border: 2px dashed var(--primary-color); padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; display: none; }
        /* 로딩 애니메이션 */
        .loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.85); z-index:999; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><div class="spinner"></div><p id="loading-text">처리 중입니다...</p></div>

<div class="container">
    <h1>📱 2026 디벗 대여 시스템</h1>
    
    <div id="main-ui">
        <div class="notice-box">
            <strong>[이용 안내]</strong><br>
            • 대여 시간: 07:00 ~ 24:00 (월~일)<br>
            • <strong>반납: 다음 날 조례 시간까지 반드시 완료</strong>
        </div>

        <div class="tab-menu">
            <button onclick="showSection('rent')" id="tab-rent" class="active">대여하기</button>
            <button onclick="showSection('return')" id="tab-return">현황 조회/반납</button>
        </div>

        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(isSubmitting) handleFinish();"></iframe>

        <div id="rent-section" class="section active">
            <form id="rent-form" action="https://script.google.com/macros/s/AKfycbyY4MC1Aa8SlbEv7JlrHriXTbP0EVoRt037Kiu5jnWNkq3WFZDzrLp99YNsHbN2XOPQTA/exec" method="POST" target="hidden_iframe" onsubmit="return validateRent()">
                <input type="hidden" name="action" value="rent">
                <label class="input-label">학년 / 반 / 번호</label>
                <div class="id-grid">
                    <input type="number" name="grade" id="rg" placeholder="학년" required>
                    <input type="number" name="classNum" id="rc" placeholder="반" required>
                    <input type="number" name="studentNum" id="rn" placeholder="번호" required>
                </div>
                <label class="input-label">이름</label>
                <input type="text" name="name" id="rname" placeholder="이름 입력" required style="margin-bottom:20px;">
                <label class="input-label">연락처</label>
                <input type="tel" name="phone" placeholder="01012345678" required>
                <button type="submit" class="main-btn">대여 신청하기</button>
            </form>
        </div>

        <div id="return-section" class="section">
            <label class="input-label">학년 / 반 / 번호</label>
            <div class="id-grid">
                <input type="number" id="cg" placeholder="학년">
                <input type="number" id="cc" placeholder="반">
                <input type="number" id="cn" placeholder="번호">
            </div>
            <label class="input-label">이름</label>
            <input type="text" id="cname" placeholder="대여 시 입력한 이름" style="margin-bottom:20px;">
            <button type="button" class="main-btn" style="background:#666;" onclick="checkStatus()">대여 정보 조회</button>

            <div id="status-card" class="status-card">
                <p><strong id="info-text" style="font-size:1.1rem; color:var(--primary-color);"></strong></p>
                <p id="time-text" style="font-size:0.85rem; color:#888; margin-bottom:15px;"></p>
                <form id="return-form" action="https://script.google.com/macros/s/AKfycbyY4MC1Aa8SlbEv7JlrHriXTbP0EVoRt037Kiu5jnWNkq3WFZDzrLp99YNsHbN2XOPQTA/exec" method="POST" target="hidden_iframe" onsubmit="isSubmitting=true; showLoading();">
                    <input type="hidden" name="action" value="return">
                    <input type="hidden" name="grade" id="hg"><input type="hidden" name="classNum" id="hc">
                    <input type="hidden" name="studentNum" id="hn">
                    <input type="hidden" name="name" id="hname">
                    <button type="submit" class="main-btn" style="background:var(--accent-color);">반납 완료하기</button>
                </form>
            </div>
            <p id="no-data" style="display:none; color:var(--accent-color); text-align:center; font-weight:bold; margin-top:20px;">일치하는 대여 내역이 없습니다.</p>
        </div>
    </div>

    <div id="success-ui" style="display:none; text-align:center; padding:40px 0;">
        <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
        <h2 style="color:var(--success-color); margin-bottom: 10px;">처리가 완료되었습니다!</h2>
        <p style="color:#666; margin-bottom: 30px;">시트에 데이터가 정상적으로 반영되었습니다.</p>
        <button class="main-btn" onclick="location.reload()">처음으로 돌아가기</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyY4MC1Aa8SlbEv7JlrHriXTbP0EVoRt037Kiu5jnWNkq3WFZDzrLp99YNsHbN2XOPQTA/exec";
    let isSubmitting = false;

    function showSection(s) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.tab-menu button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(s + '-section').classList.add('active');
        document.getElementById('tab-' + s).classList.add('active');
    }

    function showLoading() { document.getElementById('loading').style.display = 'flex'; }

    // 대여 전 중복 체크
    function validateRent() {
        const g = document.getElementById('rg').value;
        const c = document.getElementById('rc').value;
        const n = document.getElementById('rn').value;
        if(!g || !c || !n) return false;

        showLoading();
        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?action=check&grade=${g}&classNum=${c}&studentNum=${n}&callback=confirmRent`;
        document.body.appendChild(script);
        document.body.removeChild(script);
        return false; 
    }

    function confirmRent(res) {
        if(res.status === "renting") {
            document.getElementById('loading').style.display = 'none';
            alert("⚠️ 현재 대여 중인 기기입니다. 반납을 먼저 진행해 주세요.");
        } else {
            isSubmitting = true;
            document.getElementById('rent-form').submit(); 
        }
    }

    // 전송 완료 후 호출되는 함수
    function handleFinish() {
        isSubmitting = false;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('success-ui').style.display = 'block';
    }

    function checkStatus() {
        const g = document.getElementById('cg').value;
        const c = document.getElementById('cc').value;
        const n = document.getElementById('cn').value;
        const name = document.getElementById('cname').value;
        if(!g || !c || !n || !name) return alert("정보를 모두 입력하세요.");

        showLoading();
        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?action=check&grade=${g}&classNum=${c}&studentNum=${n}&name=${encodeURIComponent(name)}&callback=showResult`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    function showResult(res) {
        document.getElementById('loading').style.display = 'none';
        const card = document.getElementById('status-card');
        const noData = document.getElementById('no-data');

        if(res.status === "renting") {
            document.getElementById('info-text').innerText = `${res.name} 학생 - 대여 중`;
            document.getElementById('time-text').innerText = `대여 시각: ${res.time}`;
            document.getElementById('hg').value = document.getElementById('cg').value;
            document.getElementById('hc').value = document.getElementById('cc').value;
            document.getElementById('hn').value = document.getElementById('cn').value;
            document.getElementById('hname').value = document.getElementById('cname').value;
            card.style.display = 'block'; noData.style.display = 'none';
        } else {
            card.style.display = 'none'; noData.style.display = 'block';
        }
    }
</script>
</body>
</html>
